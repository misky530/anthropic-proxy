version: '3.8'
services:
  proxy:
    build: .
    ports:
      - "3456:3456"
    environment:
      - UPSTREAM_BASE_URL=https://ai.ctaigw.cn/v1
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-}
      - DEFAULT_MODEL=deepseek-v3.2
      - MODEL_CLAUDE_SONNET=deepseek-v3.2
      - MODEL_CLAUDE_HAIKU=qwen3-coder-next
      - DEBUG=false
    restart: unless-stopped
