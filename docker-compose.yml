version: "3.8"
services:
  proxy:
    build: .
    ports:
      - "28095:3456"
    environment:
      - UPSTREAM_BASE_URL=https://api.deepseek.com
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-}
      - DEFAULT_MODEL=deepseek-chat
      - MODEL_CLAUDE_SONNET=deepseek-chat
      - MODEL_CLAUDE_HAIKU=deepseek-chat
      - DEBUG=false
    restart: unless-stopped
